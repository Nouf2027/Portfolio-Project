version: '3.8'

services:
  db:
    image: postgres:15
    container_name: jeel_db
    environment:
      POSTGRES_USER: jeel_user
      POSTGRES_PASSWORD: jeel_password
      POSTGRES_DB: jeel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
